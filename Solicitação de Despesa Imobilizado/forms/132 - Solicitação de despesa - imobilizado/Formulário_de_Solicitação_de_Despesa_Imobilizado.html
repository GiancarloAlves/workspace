<!DOCTYPE html>
<html>

<head>
	<title>Form</title>

	<link rel="stylesheet" type="text/css" href="/style-guide/css/fluig-style-guide.min.css" />
	<script src="/resources/js/jquery/jquery.js"></script>
	<script src="/resources/js/jquery/jquery-ui.min.js"></script>
	<script src="/resources/js/mustache/mustache-min.js"></script>
	<script src="/style-guide/js/fluig-style-guide.min.js"></script>

	<!-- CUSTOM -->
	<link href="/style-guide/css/fluig-style-guide-filter.min.css" rel="stylesheet" type="text/css" />
	<link href="/style-guide/css/fluig-style-guide-ratingstars.min.css" rel="stylesheet" type="text/css" />
	<script src="/style-guide/js/fluig-style-guide-filter.min.js"></script>
	<script src="/style-guide/js/fluig-style-guide-ratingstars.min.js"></script>

	<link href="/webdesk/customresources?cid=1&resourceName=temaFormulario/0.css" type="text/css" rel="stylesheet" />
</head>



<body class="fluig-style-guide">
	<form class="totvs-form grid vertical create-form-components ui-sortable t0" name="createFormComponents"
		style="padding-left: 10px; padding-right: 10px">
		<h1 class="title-form-application">
			Formulário de Solicitação de Despesa Imobilizado
		</h1>
		<div class="paragraph-is-required system-message-information alert alert-info" role="alert">
			Todos os campos com * são de preenchimento obrigatório.
		</div>

		<div class="panel panel-primary">
			<div class="panel-heading">
			  <h3 class="panel-title"> Informações da compra</h3>
		  </div>
			<div class="panel-body">

				<div class="row">

				<div class="form-group col-md-6">
					<label>Descrição da solicitação</label>
					<span class="required text-danger"><strong>*</strong></span>
					<textarea class="form-control" name="descricao" value="" placeholder="Descreva com detalhes a sua solicitação" rows="5"
						required="required"></textarea>
				</div>

				<div class="form-group col-md-6">
					<label>Informações sobre a compra</label>
					<textarea class="form-control" name="info_compra" rows="5"></textarea>
				</div>

				</div>

				<div class="row">

				<div class="form-group col-md-4">
					<label>Em qual setor será usado?</label>
					<span class="required text-danger"><strong>*</strong></span>
					<div group="input-group">
						<input type="text" class="form-control"
						name="setor_utilizaca" value="" placeholder="" data-size="big" style="width: 100%"
						required="required" />
				</div>
			</div>

				<div class="form-group col-md-4">
					<label>Urgência</label>
					<div group="input-group">
					<input type="text" class="form-control" name="urgencia" placeholder="Descreva em dias ou horas a urgência para compra" />
				</div>
				</div>


				<div class="form-group col-md-4">
					<label>Data que precisa desse produto</label>
					<div group="input-group">
					<input type="text" class="form-control"
						name="data_necessidad" mask="00/00/0000" maxlength="10" data-only-numbers="true"/>
				</div>
				</div>

					
				</div>
			</div>
			</div>

			<div class="panel panel-primary">
				<div class="panel-heading">
				  <h3 class="panel-title"> Aprovação diretoria</h3>
			  </div>
				<div class="panel-body">

				<div class="form-group">
					<label>Aprovação</label>
					<div class="radio-options">
						<div class="radio">
							<label><input type="radio" name="aprov" value="Aprovado" checked/>Aprovado</label>
						</div>
						<div class="radio">
							<label><input type="radio" name="aprov" value="Reprovado" />Reprovado</label>
						</div>
					</div>
				</div>

				<div class="form-group">
					<label>Observações</label><input type="text" class="form-control" name="obs_diretoria" value=""
						placeholder="" data-size="big" />
				</div>

				</div>
				</div>

				<div class="panel panel-primary">
					<div class="panel-heading">
					  <h3 class="panel-title"> Dados da compra</h3>
				  </div>
					<div class="panel-body">

				<div class="form-group">
					<label>Aonde foi realizada a compra</label><input type="text" class="form-control" name="loc_compra"
						value="" placeholder="" data-size="big" />
				</div>

				<div class="form-group">
					<label>Fornecedor / Contato</label><input type="text" class="form-control" name="fornecedor"
						value="" placeholder="" data-size="big" />
				</div>

					</div>
				</div>

	</form>

	<script type="text/javascript">
		var keyDown = false,
			ctrl = 17,
			vKey = 86,
			Vkey = 118;

		$(document)
			.keydown(function (e) {
				if (e.keyCode == ctrl) keyDown = true;
			})
			.keyup(function (e) {
				if (e.keyCode == ctrl) keyDown = false;
			});

		$("[data-only-numbers]")
			.on("keypress", function (e) {
				if (!e) {
					var e = window.event;
				}

				if (e.keyCode > 0 && e.which == 0) {
					return true;
				}

				if (e.keyCode) {
					code = e.keyCode;
				} else if (e.which) {
					code = e.which;
				}

				if (code == 46) {
					return true;
				}

				var character = String.fromCharCode(code);
				if (character == "\b" || character == " " || character == "\t") {
					return true;
				}
				if (keyDown && (code == vKey || code == Vkey)) {
					return character;
				} else {
					return /[0-9]$/.test(character);
				}
			})
			.on("focusout", function (e) {
				var $this = $(this);
				if ($this.val() == "") {
					return true;
				}
				$this.val($this.val().replace(/[^0-9\.]/g, ""));
			})
			.on("paste", function (e) {
				var $this = $(this);
				setTimeout(function () {
					$this.val($this.val().replace(/[^0-9\.]/g, ""));
				}, 5);
			});

		$(".create-form-components").on(
			"keyup",
			'input[required="required"][type="text"], input[required="required"][type="number"], input[required="required"][type="date"], textarea[required="required"]',
			function () {
				validationFieldsForm(
					$(this),
					$(this).parents(".form-field").data("type")
				);
			}
		);

		$(".create-form-components").on(
			"change",
			'input[required="required"][type="checkbox"], input[required="required"][type="radio"], select[required="required"]',
			function () {
				validationFieldsForm(
					$(this),
					$(this).parents(".form-field").data("type")
				);
			}
		);

		function validationFieldsForm(field, type) {
			if (type === "checkbox" || type === "radio") {
				if (!field.is(":checked")) {
					field.parents(".form-field").addClass("required");
				} else {
					field.parents(".form-field").removeClass("required");
				}
			} else {
				if (!field.val().trim()) {
					field.parents(".form-field").addClass("required");
				} else {
					field.parents(".form-field").removeClass("required");
				}
			}
		}

		var $zoomPreview = $(".zoom-preview");
		if ($zoomPreview.length) {
			$zoomPreview.parent().removeClass("input-group");
			$zoomPreview.remove();
		}

		var ratings = $(".rating");
		if (ratings.length > 0) ratingStars(ratings);
		function ratingStars(stars) {
			$.each(stars, function (i, obj) {
				var field = $(this).closest(".form-group").find(".rating-value");
				var tgt = $(obj);
				tgt.html("");
				var rating = FLUIGC.stars(tgt, { value: field.val() });
				rating.on("click", function (o) {
					field.val($(this).index() + 1);
				});
			});
		}

		$.each($("[data-date]"), function (i, o) {
			var id = $(o).attr("id");
			FLUIGC.calendar("#" + id);
		});

		$(document).ready(function () {
			$.each($("[data-date]"), function (i, o) {
				var id = $(o).attr("id");
				if ($("#" + id).attr("readonly")) {
					$("#" + id)
						.data("DateTimePicker")
						.disable();
				}
			});
		});
	</script>
</body>

</html>
