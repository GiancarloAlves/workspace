<!DOCTYPE html>
<html>

<head>
  <title>Form</title>

  <link rel="stylesheet" type="text/css" href="/style-guide/css/fluig-style-guide.min.css" />
  <script src="/resources/js/jquery/jquery.js"></script>
  <script src="/resources/js/jquery/jquery-ui.min.js"></script>
  <script src="/resources/js/mustache/mustache-min.js"></script>
  <script src="/style-guide/js/fluig-style-guide.min.js"></script>

  <!-- CUSTOM -->
  <link href="/style-guide/css/fluig-style-guide-filter.min.css" rel="stylesheet" type="text/css" />
  <link href="/style-guide/css/fluig-style-guide-ratingstars.min.css" rel="stylesheet" type="text/css" />
  <link type="text/css" rel="stylesheet" href="./style.css">
  <script src="/style-guide/js/fluig-style-guide-filter.min.js"></script>
  <script src="/style-guide/js/fluig-style-guide-ratingstars.min.js"></script>
  <script type="text/javascript" src="./app.js"></script>

  <link href="/webdesk/customresources?cid=1&resourceName=temaFormulario/0.css" type="text/css" rel="stylesheet" />
</head>

<body class="fluig-style-guide process-style" id="devkit-style">
  <form class="totvs-form grid vertical create-form-components ui-sortable t0" name="createFormComponents"
    style="padding-left: 10px; padding-right: 10px">
    <h1 class="title-form-application">Solicitação e sugestão de melhoria</h1>

    <!--declaração do primeiro painel-->
    <div class="panel panel-primary">
      <div class="panel-heading">
        <h3 class="panel-title subpanel_title">
          <a class="collapse-icon up" data-toggle="collapse" data-parent="#accordion" href="#abertura">
            <i class="flaticon flaticon-star-active icon-md" aria-hidden="true"></i>
            Descrição da melhoria
          </a>
        </h3>
      </div>
      <div id="abertura" class="panel-collapse collapse in">
        <div class="panel-body">
          <!--início do primeiro row-->
          <div class="row">
            <div class="form-input">
              <div class="form-group col-md-2">
                <label>Matrícula solicitante</label>
                <input type="text" class="form-control" name="matricula" id="matricula" data-size="small" readonly />
              </div>
            </div>

            <div class="form-input">
              <div class="form-group col-md-3">
                <label>Solicitante</label>
                <input type="text" class="form-control" name="solicitante" id="solicitante" readonly>
              </div>
            </div>

            <div class="form-input">
              <div class="form-group col-md-2">
                <label>Mat. Supervisor</label>
                <input type="text" class="form-control" name="matSupervisor" id="matSupervisor" data-size="small"
                  readonly />
              </div>
            </div>

            <div class="form-input">
              <div class="form-group col-md-2">
                <label>Supervisor</label>
                <input type="text" class="form-control" name="supervisorSolicitante" id="supervisorSolicitante"
                  data-size="small" readonly />
              </div>
            </div>

            <div class="form-field" data-type="zoomfield" data-show-properties="" data-field-name="DSProcesso">
              <div class="form-input">
                <div class="form-group col-md-3">
                  <label for="zoom required">Processo a ser melhorado </label>
                  <div class="input-group">
                    <input type="zoom" class="form-control"
                      placeholder="(caso seja sugestão de um novo processo, deixar em branco)" name="DSProcesso"
                      dataset="processDefinition" zoomvalue="processId" datasetvalue="processDescription"
                      data-zoom="{'displayKey':'processDescription','datasetId':'processDefinition','fields':[{'field':'processDescription','label':'processDescription','standard':true}]}" />
                    <div class="input-group-addon zoom-preview">
                      <span class="fluigicon fluigicon-zoom-in"></span>
                    </div>
                    <!-- <input type="hidden" name="hidden_DSProcesso" id="hidden_DSProcesso" /> -->
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="form-field" data-type="textbox" data-show-properties="" data-field-name="NovoProcesso"
            style="position: relative; left: 0px; top: 0px">
            <div class="form-input">
              <div class="form-group">
                <label>Novo processo?</label>
                <input type="text" class="form-control" name="NovoProcesso"
                  placeholder="Caso a sua sugestão seja o desenvolvimento de um novo processo, escrever o nome" />
              </div>
            </div>
          </div>

          <div class="form-field" data-type="textarea" data-field-name="DescrMelhoria">
            <div class="form-input">
              <div class="form-group">
                <label class="required">Descrição da melhoria</label>
                <textarea class=" form-control" rows="3" name="DescrMelhoria" id="DescrMelhoria"></textarea>
              </div>
            </div>
          </div>

          <div class="form-field" data-type="textarea" data-field-name="Ganho"
            style="position: relative; left: 0px; top: 0px">
            <div class="form-input">
              <div class="form-group">
                <label class="required">Você consegue estimar o ganho da melhoria?</label>
                <textarea class="form-control" rows="3" name="Ganho"
                  placeholder="Descreva aqui o ganho que a melhoria pode trazer" data-size="big"></textarea>
              </div>
            </div>
          </div>
        </div> <!--fecha panel body-->
      </div>
    </div> <!--fecha painel-->

    <div class="panel panel-primary">
      <div class="panel-heading">
        <h3 class="panel-title subpanel_title">
          <a class="collapse-icon up" data-toggle="collapse" data-parent="#accordion" href="#analiseSup">
            <i class="flaticon flaticon-supervisor-account icon-md" aria-hidden="true"></i>
            Análise do Supervisor
          </a>
        </h3>
      </div>
      <div id="analiseSup" class="panel-collapse collapse in">
        <div class="panel-body">
          <div class="form-input">
            <div class="row">
              <div class="form-group col-md-3">
                <label class="required">Aprovar solicitação?</label>
                <select class="form-control" name="aprovarSolicitacao" id="aprovarSolicitacao">
                  <option value="sim">Sim</option>
                  <option value="nao">Não</option>
                </select>
              </div>
            </div>
          </div>
          <div class="form-field" data-type="textarea" data-field-name="analiseSupervisor">
            <div class="form-input">
              <div class="row">
                <div class="form-group col-md-12">
                  <label class="required">Observação</label>
                  <textarea class="form-control" rows="3" name="analiseSupervisor" data-size="big"></textarea>
                </div>
              </div>
            </div>
          </div>
        </div> <!--fecha panel body-->
      </div>
    </div> <!--fecha painel-->

    <!--declaração do segundo painel-->
    <div class="panel panel-primary">
      <div class="panel-heading">
        <h3 class="panel-title subpanel_title">
          <a class="collapse-icon up" data-toggle="collapse" data-parent="#accordion" href="#solucaoTI">
            <i class="flaticon flaticon-fluig icon-md" aria-hidden="true"></i>
            Retorno do processo
          </a>
        </h3>
      </div>
      <div id="solucaoTI" class="panel-collapse collapse in">
        <div class="panel-body">
          <div class="row">
            <div class="form-group col-md-3">
              <label class="required">Devolver para supervisor?</label>
              <select class="form-control" name="devolverSupervisor" id="devolverSupervisor">
                <option value="nao">Não</option>
                <option value="sim">Sim</option>
              </select>
            </div>
          </div>
          <div class="row">
            <div class="col-md-12">
              <div class="form-input">
                <div class="form-group">
                  <label class="required">Solução/Ação/Observação da melhoria</label>
                  <textarea class="form-control" rows="4" name="Solucao" data-size="big"></textarea>
                </div>
              </div>
            </div>
          </div>
        </div> <!--fecha panel body-->
      </div>
    </div> <!--fecha painel-->

    <!--declaração do segundo painel-->
    <div class="panel panel-primary">
      <div class="panel-heading">
        <h3 class="panel-title subpanel_title">
          <a class="collapse-icon up" data-toggle="collapse" data-parent="#accordion" href="#fechamento">
            <i class="flaticon flaticon-file-awards icon-md" aria-hidden="true"></i>
            Fechamento
          </a>
        </h3>
      </div>
      <div id="fechamento" class="panel-collapse collapse in">
        <div class="panel-body">
          <div class="row">
            <div class="form-field" data-type="radio" data-show-properties="" data-field-name="Atendeu">
              <div class="form-input">
                <div class="form-group col-md-3">
                  <label class="required">Demanda foi atendida?</label>
                  <div class="radio-options">
                    <div class="radio">
                      <label>
                        <input type="radio" checked name="Atendeu" value="Sim" />
                        Sim
                      </label>
                    </div>
                    <div class="radio">
                      <label>
                        <input type="radio" name="Atendeu" value="Não" />
                        Não
                      </label>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <div class="form-field" data-type="ratingstar" data-show-properties="" data-field-name="Feedback">
              <div class="form-input">
                <div class="form-group col-md-3">
                  <label>Feedback</label>
                  <div class="rating fluig-ratingstars">
                    <i class="fa fluigicon fluigicon-star-empty icon-sm"></i><i
                      class="fa fluigicon fluigicon-star-empty icon-sm"></i><i
                      class="fa fluigicon fluigicon-star-empty icon-sm"></i><i
                      class="fa fluigicon fluigicon-star-empty icon-sm"></i><i
                      class="fa fluigicon fluigicon-star-empty icon-sm"></i>
                  </div>
                  <input type="hidden" name="Feedback" class="rating-value" />
                </div>
              </div>
            </div>

            <div class="form-field" data-type="radio" data-show-properties="" data-field-name="DecisorFinal">
              <div class="form-input">
                <div class="form-group col-md-3">
                  <label>Finalizar?</label>
                  <div class="radio-options">
                    <div class="radio">
                      <label><input type="radio" name="DecisorFinal" value="Sim" />Sim</label>
                    </div>
                    <div class="radio">
                      <label><input type="radio" name="DecisorFinal" value="Retornar para o processo" />Retornar para o
                        processo</label>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div> <!--fecha o row-->
          <div class="form-field" data-type="textarea" data-show-properties="" data-field-name="ComentarioSolic">
            <div class="form-input">
              <div class="form-group">
                <label>Comentário</label><textarea class="form-control" rows="3" name="ComentarioSolic" placeholder=""
                  data-size="big"></textarea>
              </div>
            </div>
          </div>
        </div>
  </form>

  <script type="text/javascript">
    var keyDown = false,
      ctrl = 17,
      vKey = 86,
      Vkey = 118;

    $(document)
      .keydown(function (e) {
        if (e.keyCode == ctrl) keyDown = true;
      })
      .keyup(function (e) {
        if (e.keyCode == ctrl) keyDown = false;
      });

    $("[data-only-numbers]")
      .on("keypress", function (e) {
        if (!e) {
          var e = window.event;
        }

        if (e.keyCode > 0 && e.which == 0) {
          return true;
        }

        if (e.keyCode) {
          code = e.keyCode;
        } else if (e.which) {
          code = e.which;
        }

        if (code == 46) {
          return true;
        }

        var character = String.fromCharCode(code);
        if (character == "\b" || character == " " || character == "\t") {
          return true;
        }
        if (keyDown && (code == vKey || code == Vkey)) {
          return character;
        } else {
          return /[0-9]$/.test(character);
        }
      })
      .on("focusout", function (e) {
        var $this = $(this);
        if ($this.val() == "") {
          return true;
        }
        $this.val($this.val().replace(/[^0-9\.]/g, ""));
      })
      .on("paste", function (e) {
        var $this = $(this);
        setTimeout(function () {
          $this.val($this.val().replace(/[^0-9\.]/g, ""));
        }, 5);
      });

    $(".create-form-components").on(
      "keyup",
      'input[required="required"][type="text"], input[required="required"][type="number"], input[required="required"][type="date"], textarea[required="required"]',
      function () {
        validationFieldsForm(
          $(this),
          $(this).parents(".form-field").data("type")
        );
      }
    );

    $(".create-form-components").on(
      "change",
      'input[required="required"][type="checkbox"], input[required="required"][type="radio"], select[required="required"]',
      function () {
        validationFieldsForm(
          $(this),
          $(this).parents(".form-field").data("type")
        );
      }
    );

    function validationFieldsForm(field, type) {
      if (type === "checkbox" || type === "radio") {
        if (!field.is(":checked")) {
          field.parents(".form-field").addClass("required");
        } else {
          field.parents(".form-field").removeClass("required");
        }
      } else {
        if (!field.val().trim()) {
          field.parents(".form-field").addClass("required");
        } else {
          field.parents(".form-field").removeClass("required");
        }
      }
    }

    var $zoomPreview = $(".zoom-preview");
    if ($zoomPreview.length) {
      $zoomPreview.parent().removeClass("input-group");
      $zoomPreview.remove();
    }

    var ratings = $(".rating");
    if (ratings.length > 0) ratingStars(ratings);
    function ratingStars(stars) {
      $.each(stars, function (i, obj) {
        var field = $(this).closest(".form-group").find(".rating-value");
        var tgt = $(obj);
        tgt.html("");
        var rating = FLUIGC.stars(tgt, { value: field.val() });
        rating.on("click", function (o) {
          field.val($(this).index() + 1);
        });
      });
    }

    $.each($("[data-date]"), function (i, o) {
      var id = $(o).attr("id");
      FLUIGC.calendar("#" + id);
    });

    $(document).ready(function () {
      $.each($("[data-date]"), function (i, o) {
        var id = $(o).attr("id");
        if ($("#" + id).attr("readonly")) {
          $("#" + id)
            .data("DateTimePicker")
            .disable();
        }
      });
    });
  </script>
</body>

</html>
