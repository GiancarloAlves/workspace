<html>
  <head>
    <link
      type="text/css"
      rel="stylesheet"
      href="/style-guide/css/fluig-style-guide.min.css"
    />
    <script
      type="text/javascript"
      src="/portal/resources/js/jquery/jquery.js"
    ></script>
    <script
      type="text/javascript"
      src="/portal/resources/js/jquery/jquery-ui.min.js"
    ></script>
    <script
      type="text/javascript"
      src="/portal/resources/js/mustache/mustache-min.js"
    ></script>
    <script
      type="text/javascript"
      src="/style-guide/js/fluig-style-guide.min.js"
      charset="utf-8"
    ></script>

    <!-- Dataset -->
    <script type="text/javascript" src="/webdesk/vcXMLRPC.js"></script>

    <!-- sweetalert2 -->
    <script src="//cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- FontAwesome -->
    <link
      type="text/css"
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
    />

    <!-- JQuery Mask Plugin -->
    <script src="https://igorescobar.github.io/jQuery-Mask-Plugin/js/jquery.mask.min.js"></script>

    <!-- Custom -->
    <link type="text/css" rel="stylesheet" href="./style.css" />
    <script type="text/javascript" src="./app.js"></script>
  </head>

  <body class="fluig-style-guide process-style" id="devkit-style">
    <form name="form" role="form" id="form-processo">
      <div class="panel panel-primary panel-border">
        <div class="panel-heading panel-bg panel-border">
          <!-- início da declaração do cabeçalho principal (azul) -->
          <div class="container-fluid">
            <section id="logo">
              <img
                src="./images/logoCigame.png"
                alt="NOME-CLIENTE"
                width="130"
                style="padding: 10px"
              />
              <h3 class="panel-title">Desbloqueio de Itens</h3>
            </section>
          </div>
        </div>

        <div class="panel-body">
          <div class="panel panel-primary">
            <div class="panel-heading">
              <h3 class="panel-title subpanel_title">
                <span id="led_abertura" class="led"></span>
                <a
                  class="collapse-icon up"
                  data-toggle="collapse"
                  data-parent="#accordion"
                  href="#dadosSolicitacao"
                  ><i class="far fa-clipboard"></i> DADOS SOLICITAÇÃO</a
                >
              </h3>
            </div>
            <div id="dadosSolicitacao" class="panel-collapse collapse in">
              <div class="panel-body">
                <div class="row">
                  <div class="form-group col-md-6">
                    <label>Código do produto</label>
                    <div class="input-group">
                      <input
                        type="text"
                        name="codigoProduto"
                        id="codigoProduto"
                        class="form-control"
                      />
                      <span class="input-group-addon"
                        ><i class="fas fa-pen"></i
                      ></span>
                    </div>
                  </div>

                  <div class="form-group col-md-6">
                    <label>Nome do produto</label>
                    <div class="input-group">
                      <input
                        type="text"
                        name="nomeProduto"
                        id="nomeProduto"
                        class="form-control"
                      />
                      <span class="input-group-addon"
                        ><i class="fas fa-pen"></i
                      ></span>
                    </div>
                  </div>
                </div>

                <div class="row">
                  <div class="form-group col-md-12">
                    <label>Observação</label>
                    <div class="input-group">
                      <textarea
                        class="form-control"
                        name="observacao"
                        id="observacao"
                        rows="2"
                      ></textarea>
                      <span class="input-group-addon"
                        ><i class="fas fa-pen"></i
                      ></span>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="panel panel-primary">
            <div class="panel-heading">
              <h3 class="panel-title subpanel_title">
                <span id="led_desbloqueio" class="led"></span>
                <a
                  class="collapse-icon up"
                  data-toggle="collapse"
                  data-parent="#accordion"
                  href="#desbloqueio"
                  ><i class="far fa-clipboard"></i> DESBLOQUEIO</a
                >
              </h3>
            </div>
            <div id="desbloqueio" class="panel-collapse collapse in">
              <div class="panel-body">
                <div class="row">
                  <div class="form-group col-md-3">
                    <label class="required">Ação do desbloqueio</label>
                    <select
                      name="acaoDesbloqueio"
                      id="acaoDesbloqueio"
                      class="form-control"
                    >
                      <option value="">Selecione uma opção...</option>
                      <option value="desbloquear">Desbloquear</option>
                      <option value="cancelar">Cancelar desbloqueio</option>
                    </select>
                  </div>
                </div>

                <div class="row">
                  <div class="form-group col-md-12">
                    <label>Observação do desbloqueio (Opcional)</label>
                    <div class="input-group">
                      <textarea
                        class="form-control"
                        name="observacaoDesbloqueio"
                        id="observacaoDesbloqueio"
                        rows="2"
                      ></textarea>
                      <span class="input-group-addon"
                        ><i class="fas fa-pen"></i
                      ></span>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </form>
  </body>
</html>
