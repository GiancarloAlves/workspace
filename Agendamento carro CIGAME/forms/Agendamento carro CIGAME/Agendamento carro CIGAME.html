<html>

<head>
	<link type="text/css" rel="stylesheet" href="/style-guide/css/fluig-style-guide.min.css" />
	<script type="text/javascript" src="/portal/resources/js/jquery/jquery.js"></script>
	<script type="text/javascript" src="/portal/resources/js/jquery/jquery-ui.min.js"></script>
	<script type="text/javascript" src="/portal/resources/js/mustache/mustache-min.js"></script>
	<script type="text/javascript" src="/style-guide/js/fluig-style-guide.min.js" charset="utf-8"></script>

	<!-- sweetalert2 -->
	<script src="//cdn.jsdelivr.net/npm/sweetalert2@11"></script>

	<!-- Dataset -->
	<script type="text/javascript" src="/webdesk/vcXMLRPC.js"></script>

	<!-- FontAwesome -->
	<link type="text/css" rel="stylesheet"
		href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.13.0/css/all.min.css">

	<!-- JQuery Mask Plugin -->
	<script src="https://igorescobar.github.io/jQuery-Mask-Plugin/js/jquery.mask.min.js"></script>

	<!-- Custom -->
	<linFk type="text/css" rel="stylesheet" href="./style_fin.css">
	<script type="text/javascript" src="./app.js"></script>
</head>

<body class="fluig-style-guide process-style" id="devkit-style">
	<form name="form" role="form" id="form-processo">

		<div class="panel panel-primary panel-border">
			<!--Painel geral do formulário - fecha no extremo do arquivo e contém todas as seções-->

			<div class="panel-heading panel-bg panel-border"> <!--início da declaração do cabeçalho principal (azul)-->
				<div class="container-fluid">
					<section id="logo">
						<img src="./images/logoCigame.png" alt="NOME-CLIENTE" width="130" style="padding: 10px;">
						<h3 class="panel-title">Agendamento carro</h3>
					</section>
				</div>
			</div> <!--fim da declaração do cabeçalho principal (azul)-->

			<div class="panel-body"> <!--panel body geral do arquivo - fecha no extremo e contém todas as seções-->

				<div class="panel panel-primary"> <!--declaração da primeira seção-->
					<div class="panel-heading"> <!--início do cabeçalho da seção-->
						<h3 class="panel-title subpanel_title">
							<a class="collapse-icon up" data-toggle="collapse" data-parent="#accordion"
								href="#abertura"><i class="far fa-clipboard"></i> ABERTURA</a>
						</h3>
					</div> <!--fim da declaração do cabeçalho da seção-->

					<div id="abertura" class="panel-collapse collapse in">

						<div class="panel-body">

							<div class="form-group col-md-3">
								<label>Vendedor</label>
								<div class="input-group">
									<input type="text" name="vendedor" id="vendedor" class="form-control" readonly>
									<span class="input-group-addon">
										<i class="far fa-user"></i>
									</span>
								</div>
							</div>

							<div class="form-group col-md-3">
								<label>Foi feito o agendamento na planilha no Drive?</label>
								<div class="form-check">
									<label class="form-check-label">
										<input type="radio" class="form-check-input" name="drive" value="Sim"
											checked>Sim</label>
								</div>
								<div class="form-check">
									<label class="form-check-label">
										<input type="radio" class="form-check-input" name="drive"
											value="Nao">Não</label>
								</div>
							</div>

						</div> <!--fim do panel body-->
					</div> <!-- fim do painel colapsável-->
				</div> <!--fim do panel primary-->

				<div class="panel panel-primary"> <!--declaração da primeira seção-->
					<div class="panel-heading"> <!--início do cabeçalho da seção-->
						<h3 class="panel-title subpanel_title">
							<a class="collapse-icon up" data-toggle="collapse" data-parent="#accordion"
								href="#entrega"><i class="fas fa-key"></i> Entrega da chave</a>
						</h3>
					</div> <!--fim da declaração do cabeçalho da seção-->

					<div id="entrega" class="panel-collapse collapse in">

						<div class="panel-body">

							<div class="row">

								<div class="form-group col-md-2">
									<label>Foi entregue a chave?</label>
									<div class="form-check">
										<label class="form-check-label">
											<input type="radio" class="form-check-input" name="chaveentregue"
												value="Sim" checked>Sim</label>
									</div>
									<div class="form-check">
										<label class="form-check-label">
											<input type="radio" class="form-check-input" name="chaveentregue"
												value="Nao">Não</label>
									</div>
								</div>

								<div class="form-group col-md-3">
									<label>Data e hora de entrega da chave</label>
									<div class="input-group">
										<input type="text" name="entregachave" id="entregachave"
											class="form-control data" mask="00/00/0000 00:00"
											placeholder="dd/mm/aaaa hh:mm">
										<span class="input-group-addon">
											<i class="far fa-calendar"></i>
										</span>
									</div>
								</div>

								<div class="form-group col-md-3">
									<label>Quilometragem inicial</label>
									<div class="input-group">
										<input type="text" name="kminicial" id="kminicial" class="form-control">
										<span class="input-group-addon">
											<i class="far fa-user"></i>
										</span>
									</div>
								</div>

							</div>

							<div class="row">

								<div class="form-input col-md-12">
									<label>Observação da entrega</label>
									<div class="input-group">
										<textarea class="form-control" rows="3" name="obsEnt" id="obsEnt"></textarea>
										<span class="input-group-addon"><i class="fas fa-pen"></i></span>
									</div>
								</div>


							</div>

							<table id="checklist" class="table pai-filho" tablename="checklist" noaddbutton="true"
								nodeletebutton="true">
								<caption><i class="fas fa-info"></i> Checklist carro</caption>

								<thead>
									<tr>
										<th width="3%">N°</th>
										<th width="22%">Item</th>
										<th width="3%">OK</th>
										<th width="3%">NOK</th>
										<th width="30%">Observação</th>

									</tr>
								</thead>

								<tbody>
									<tr>
										<td><input type="text" class="form-control" id="item" name="item" readonly></td>
										<td><input type="text" class="form-control" id="fator" name="fator" readonly>
										</td>
										<td><input type="checkbox" id="f4" name="f4" value="Sim" class="checkbox"></td>
										<td><input type="checkbox" id="f3" name="f3" value="Sim" class="checkbox"></td>
										<td><input type="text" class="form-control" id="obs" name="obs"></td>
									</tr>
								</tbody>
							</table>

							<hr>
							<div class="form-group" id="additem">
								<div class="row">
									<div class="col-xs-6">
										<button class="btn btn-primary btn-custom btn-custom-primary js-add"
											data-tablename="acessos">
											<i class="fas fa-plus-circle"></i> ADICIONAR ITEM
										</button>
									</div>
								</div>
							</div>

						</div> <!--fim do panel body-->
					</div> <!-- fim do painel colapsável-->
				</div> <!--fim do panel primary-->

				<div class="panel panel-primary"> <!--declaração da primeira seção-->
					<div class="panel-heading"> <!--início do cabeçalho da seção-->
						<h3 class="panel-title subpanel_title">
							<a class="collapse-icon up" data-toggle="collapse" data-parent="#accordion"
								href="#devolucao"><i class="fas fa-key"></i> Devolução da chave</a>
						</h3>
					</div> <!--fim da declaração do cabeçalho da seção-->

					<div id="devolucao" class="panel-collapse collapse in">

						<div class="panel-body">

							<div class="row">

								<div class="form-group col-md-3">
									<label>Quilometragem final</label>
									<div class="input-group">
										<input type="text" name="kmfinal" id="kmfinal" class="form-control">
										<span class="input-group-addon">
											<i class="far fa-user"></i>
										</span>
									</div>
								</div>

								<div class="form-group col-md-3">
									<label>Data e hora de devolução da chave</label>
									<div class="input-group">
										<input type="text" name="devolvechave" id="devolvechave"
											class="form-control data" mask="00/00/0000 00:00"
											placeholder="dd/mm/aaaa hh:mm">
										<span class="input-group-addon">
											<i class="far fa-calendar"></i>
										</span>
									</div>
								</div>

								<div class="row">

									<div class="form-input col-md-12">
										<label>Observação da devolução da chave</label>
										<div class="input-group">
											<textarea class="form-control" rows="3" name="obsDev"
												id="obsDev"></textarea>
											<span class="input-group-addon"><i class="fas fa-pen"></i></span>
										</div>
									</div>

								</div>

								<table id="checklist2" class="table pai-filho" tablename="checklist2" noaddbutton="true"
									nodeletebutton="true">
									<caption><i class="fas fa-info"></i> Checklist retorno</caption>

									<thead>
										<tr>
											<th width="3%">N°</th>
											<th width="22%">Item</th>
											<th width="3%">OK</th>
											<th width="3%">NOK</th>
											<th width="30%">Observação</th>

										</tr>
									</thead>

									<tbody>
										<tr>
											<td><input type="text" class="form-control" id="item2" name="item2"
													readonly></td>
											<td><input type="text" class="form-control" id="fator2" name="fator2"
													readonly></td>
											<td><input type="checkbox" id="f2" name="f2" value="Sim" class="checkbox">
											</td>
											<td><input type="checkbox" id="f1" name="f1" value="Sim" class="checkbox">
											</td>
											<td><input type="text" class="form-control" id="obs2" name="obs2"></td>
										</tr>
									</tbody>
								</table>



							</div> <!--fim da row-->

						</div> <!--fim do panel body-->
					</div> <!-- fim do painel colapsável-->
				</div> <!--fim do panel primary-->

			</div> <!--fecha panel body principal-->
		</div> <!--fecha formulário-->

	</form>
	</div>
</body>

</html>
