<html>

<head>
  <link type="text/css" rel="stylesheet" href="/style-guide/css/fluig-style-guide.min.css" />
  <script type="text/javascript" src="/portal/resources/js/jquery/jquery.js"></script>
  <script type="text/javascript" src="/portal/resources/js/jquery/jquery-ui.min.js"></script>
  <script type="text/javascript" src="/portal/resources/js/mustache/mustache-min.js"></script>
  <script type="text/javascript" src="/style-guide/js/fluig-style-guide.min.js" charset="utf-8"></script>

  <!-- Dataset -->
  <script type="text/javascript" src="/webdesk/vcXMLRPC.js"></script>

  <!-- sweetalert2 -->
  <script src="//cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <!-- FontAwesome -->
  <link type="text/css" rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

  <!-- JQuery Mask Plugin -->
  <script src="https://igorescobar.github.io/jQuery-Mask-Plugin/js/jquery.mask.min.js"></script>

  <!-- Custom -->
  <link type="text/css" rel="stylesheet" href="./style_comp.css">
  <script type="text/javascript" src="./app.js"></script>


<body class="fluig-style-guide process-style" id="devkit-style">
  <form name="form" role="form" id="form-processo">


    <div class="panel panel-primary panel-border">
      <!--Painel geral do formulário - fecha no extremo do arquivo e contém todas as seções-->

      <div class="panel-heading panel-bg panel-border"> <!--início da declaração do cabeçalho principal (azul)-->
        <div class="container-fluid">
          <section id="logo">
            <img src="./images/logoCigame.png" alt="NOME-CLIENTE" width="130" style="padding: 10px;">
            <h3 class="panel-title">Cadastro de fornecedor / transportadora</h3>
          </section>
        </div>
      </div> <!--fim da declaração do cabeçalho principal (azul)-->

      <div class="panel-body"> <!--panel body geral do arquivo - fecha no extremo e contém todas as seções-->

        <div class="panel panel-primary"> <!--declaração da primeira seção-->
          <div class="panel-heading"> <!--início do cabeçalho da seção-->
            <h3 class="panel-title subpanel_title">
              <span id="led_abertura" class="led"></span> <!-- led indicador de estado -->
              <a class="collapse-icon up" data-toggle="collapse" data-parent="#accordion" href="#abertura"><i
                  class="far fa-clipboard"></i> DADOS DO CLIENTE</a>
            </h3>
          </div> <!--fim da declaração do cabeçalho da seção-->

          <div id="abertura" class="panel-collapse collapse in">
            <div class="panel-body">
              <div class="row">

                <div class="form-group col-md-4">
                  <label>Matrícula</label>
                  <div class="input-group">
                    <input type="text" class="form-control" name="matricula" id="matricula" readonly>
                    <span class="input-group-addon"><i class="fas fa-graduation-cap"></i></span>
                  </div>
                </div>

                <div class="form-group col-md-4">
                  <label>Solicitante</label>
                  <div class="input-group">
                    <input type="text" class="form-control" name="solicitante" id="solicitante" readonly>
                    <span class="input-group-addon"><i class="fas fa-user"></i></span>
                  </div>
                </div>

                <div class="form-group col-md-4">
                  <label>Supervisor Solicitante</label>
                  <div class="input-group">
                    <input type="text" class="form-control" name="supervisorSolicitante" id="supervisorSolicitante"
                      readonly>
                    <span class="input-group-addon"><i class="fas fa-user-shield"></i></span>
                  </div>
                </div>

              </div> <!--fecha o primeiro row-->

              <div class="row">

                <div class="form-group col-md-4">
                  <label class="required">CNPJ</label>
                  <div class="input-group">
                    <input type="text" class="form-control" name="cnpj" id="cnpj" mask="##.###.###/####-##"
                      maxlength="18" required>
                    <span class="input-group-addon"><i class="fas fa-mail-bulk"></i></span>
                  </div>
                </div>

                <div class="form-group col-md-4">
                  <label class="required">Fone</label>
                  <div class="input-group">
                    <input type="text" class="form-control" name="fone" id="fone" maxlength="15">
                    <span class="input-group-addon"><i class="fas fa-phone"></i></span>
                  </div>
                </div>

                <div class="form-group col-md-4">
                  <label class="required">E-mail financeiro</label>
                  <div class="input-group">
                    <input type="text" class="form-control" name="email" id="email">
                    <span class="input-group-addon"><i class="fas fa-mail-bulk"></i></span>
                  </div>
                </div>

              </div>

              <div class="row">

                <div class="form-group col-md-4">
                  <label class="required">Nome do cadastro comercial</label>
                  <div class="input-group">
                    <input type="text" name="cadastro" id="cadastro" class="form-control">
                    <span class="input-group-addon"><i class="fas fa-shield-virus"></i></span>
                  </div>
                </div>


                <div class="form-group col-md-4">
                  <label class="required">Nome de contato financeiro</label>
                  <div class="input-group">
                    <input type="text" name="contFinanceiro" id="contFinanceiro" class="form-control">
                    <span class="input-group-addon"><i class="fas fa-money-bill"></i></span>
                  </div>
                </div>

                <div class="form-group col-md-4">
                  <label class="required">Inscrição estadual</label>
                  <div class="input-group">
                    <input type="text" name="inscrEstadual" id="inscrEstadual" class="form-control">
                    <span class="input-group-addon">
                      <i class="fluigicon fluigicon-enrollment icon-sm" aria-hidden="true"></i>
                    </span>
                  </div>
                </div>

                <div class="form-group col-md-4">
                  <label class="required">CEP</label>
                  <div class="input-group">
                    <input type="text" name="cep" id="cep" class="form-control">
                    <span class="input-group-addon"><i class="flaticon flaticon-add-pin icon-sm"
                        aria-hidden="true"></i></span>
                  </div>
                </div>

                <div class="form-group col-md-4" id="correcao">
                  <label class="required">Reenviar solicitação?</label>
                  <div class="input-group">
                    <select class="form-control" name="reenviar" id="reeenviar">
                      <option value="">Selecione</option>
                      <option value="sim">Sim</option>
                      <option value="nao">Não, cancelar processo</option>
                    </select>
                    <span class="input-group-addon"><i class="fas fa-sort-amount-up-alt"></i></span>
                  </div>
                </div>

              </div> <!--fecha row-->

              <div class="row">

                <div class="form-group col-md-12">
                  <label>Observação vendedor</label>
                  <div class="input-group">
                    <textarea class="form-control" name="obs_vendedor" id="obs_vendedor" rows="4"></textarea>
                    <span class="input-group-addon"><i class="fas fa-pen"></i></span>
                  </div>
                </div>

              </div>
            </div> <!-- finaliza panel body-->
          </div> <!--finaliza painel colapsável-->
        </div> <!--finaliza panel-primary-->


        <!--declaração do  painel-->
        <div class="panel panel-primary"> <!--declaração da primeira seção-->
          <div class="panel-heading"> <!--início do cabeçalho da seção-->
            <h3 class="panel-title subpanel_title">
              <span id="led_compras" class="led"></span> <!-- led indicador de estado -->
              <a class="collapse-icon up" data-toggle="collapse" data-parent="#accordion" href="#compras"><i
                  class="far fa-clipboard"></i> Cadastro do Compras</a>
            </h3>
          </div> <!--fim da declaração do cabeçalho da seção-->

          <div id="compras" class="panel-collapse collapse in">
            <div class="panel-body">

              <div class="row">

                <div class="form-group col-md-3">
                  <label class="required">Aprovar solicitação?</label>
                  <div class="input-group">
                    <select class="form-control" name="aprovacao" id="aprovacao">
                      <option value="">Selecione</option>
                      <option value="sim">Sim</option>
                      <option value="nao">Não, corrigir dados</option>
                    </select>
                    <span class="input-group-addon"><i class="fas fa-sort-amount-up-alt"></i></span>
                  </div>
                </div>

                <div class="form-group col-md-4">
                  <label>Código do fornecedor/transportadora</label>
                  <div class="input-group">
                    <input type="text" name="codigo" id="ccodigo" class="form-control">
                    <span class="input-group-addon"><i class="fas fa-poll"></i></span>
                  </div>
                </div>

              </div> <!--fecha row-->

              <div class="row">

                <div class="form-group col-md-12">
                  <label>Observação Compras</label>
                  <div class="input-group">
                    <textarea class="form-control" name="obs_compras" id="obs_compras" rows="3"></textarea>
                    <span class="input-group-addon"><i class="fas fa-pen"></i></span>
                  </div>
                </div>

              </div>

            </div> <!-- finaliza panel body-->
          </div> <!--finaliza painel colapsável-->
        </div> <!--finaliza panel-primary-->

        <!--declaração do  painel-->
        <div class="panel panel-primary"> <!--declaração da primeira seção-->
          <div class="panel-heading"> <!--início do cabeçalho da seção-->
            <h3 class="panel-title subpanel_title">
              <span id="led_fim" class="led"></span> <!-- led indicador de estado -->
              <a class="collapse-icon up" data-toggle="collapse" data-parent="#accordion" href="#finalizacao"><i
                  class="far fa-clipboard"></i> Finalização do vendedor</a>
            </h3>
          </div> <!--fim da declaração do cabeçalho da seção-->

          <div id="finalizacao" class="panel-collapse collapse in">
            <div class="panel-body">

              <div class="row">

                <div class="form-group col-md-3">
                  <label class="required">Demanda atendida?</label>
                  <div class="input-group">
                    <select class="form-control" name="fim" id="fim">
                      <option value="">Selecione</option>
                      <option value="sim">Sim</option>
                      <option value="nao">Não, voltar para o compras</option>
                    </select>
                    <span class="input-group-addon"><i class="fas fa-sort-amount-up-alt"></i></span>
                  </div>
                </div>

              </div> <!--fecha row-->

              <div class="row">

                <div class="form-group col-md-12">
                  <label>Observação final</label>
                  <div class="input-group">
                    <textarea class="form-control" name="obs_final" id="obs_final" rows="2"></textarea>
                    <span class="input-group-addon"><i class="fas fa-pen"></i></span>
                  </div>
                </div>

              </div>

            </div> <!-- finaliza panel body-->
          </div> <!--finaliza painel colapsável-->
        </div> <!--finaliza panel-primary-->


      </div> <!--fim do formulário-->
    </div> <!--fim do formulário-->

  </form>
</body>

</html>
