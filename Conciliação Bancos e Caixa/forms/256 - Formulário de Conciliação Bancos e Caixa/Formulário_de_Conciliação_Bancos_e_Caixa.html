			<form class="totvs-form grid vertical create-form-components ui-sortable t0" name="createFormComponents" style="padding-left: 10px; padding-right: 10px;"><h1 class="title-form-application">Formulário de Conciliação Bancos e Caixa</h1>
			<div class="form-field" data-type="checkbox" data-show-properties="" data-field-name="ListConciliacao"><div class="form-input"><div class="form-group"><label>Lista de itens</label><div class="check-options"><div class="checkbox"><label><input type="checkbox" name="checkbox00" value="Extrato Banco Itaú (25247-6)">Extrato Banco Itaú (25247-6)</label></div><div class="checkbox"><label><input type="checkbox" name="checkbox01" value="Retorno CNAB400 Banco Itaú (25247-6)">Retorno CNAB400 Banco Itaú (25247-6)</label></div><div class="checkbox"><label><input type="checkbox" name="checkbox02" value="Extrato Banco Itaú (20818-9)">Extrato Banco Itaú (20818-9)</label></div><div class="checkbox"><label><input type="checkbox" name="checkbox03" value="Retorno CNAB400 Banco Itaú (20818-9)">Retorno CNAB400 Banco Itaú (20818-9)</label></div><div class="checkbox"><label><input type="checkbox" name="checkbox04" value="Extrato Banco do Brasil ()">Extrato Banco do Brasil ()</label></div><div class="checkbox"><label><input type="checkbox" name="checkbox05" value="Retorno CNAB400 Banco do Brasil ()">Retorno CNAB400 Banco do Brasil ()</label></div><div class="checkbox"><label><input type="checkbox" name="checkbox06" value="Extrato Banrisul ()">Extrato Banrisul ()</label></div><div class="checkbox"><label><input type="checkbox" name="checkbox07" value="Relatório vendas Redecard">Relatório vendas Redecard</label></div><div class="checkbox"><label><input type="checkbox" name="checkbox08" value="Relatório recebimentos Redecard">Relatório recebimentos Redecard</label></div><div class="checkbox"><label><input type="checkbox" name="checkbox09" value="Baixar CNAB400 Banco 341 (Winhtor : 1502)">Baixar CNAB400 Banco 341 (Winhtor : 1502)</label></div><div class="checkbox"><label><input type="checkbox" name="checkbox010" value="Baixar CNAB400 Banco 341F (Winhtor : 1502)">Baixar CNAB400 Banco 341F (Winhtor : 1502)</label></div><div class="checkbox"><label><input type="checkbox" name="checkbox011" value="Baixar CNAB400 Banco 001 (Winhtor : 1502)">Baixar CNAB400 Banco 001 (Winhtor : 1502)</label></div><div class="checkbox"><label><input type="checkbox" name="checkbox012" value="Baixas manuais de títulos (Winhtor : 1207)">Baixas manuais de títulos (Winhtor : 1207)</label></div><div class="checkbox"><label><input type="checkbox" name="checkbox013" value="Lançar tarifas Redecard (Winthor : 631)">Lançar tarifas Redecard (Winthor : 631)</label></div><div class="checkbox"><label><input type="checkbox" name="checkbox014" value="Conciliação Banco 341F (Winthor : 604)">Conciliação Banco 341F (Winthor : 604)</label></div><div class="checkbox"><label><input type="checkbox" name="checkbox015" value="Conciliação Banco 341 (Winthor : 604)">Conciliação Banco 341 (Winthor : 604)</label></div><div class="checkbox"><label><input type="checkbox" name="checkbox016" value="Conciliação Aplicação Itaú">Conciliação Aplicação Itaú</label></div><div class="checkbox"><label><input type="checkbox" name="checkbox017" value="Conciliação Banco 001 (Winthor : 604)">Conciliação Banco 001 (Winthor : 604)</label></div><div class="checkbox"><label><input type="checkbox" name="checkbox018" value="Conciliação Banco 41 (Winthor : 604)">Conciliação Banco 41 (Winthor : 604)</label></div><div class="checkbox"><label><input type="checkbox" name="checkbox019" value="Conciliação Banco 18 (Winthor : 604)">Conciliação Banco 18 (Winthor : 604)</label></div><div class="checkbox"><label><input type="checkbox" name="checkbox020" value="Conciliação Banco 10 (Winthor : 604)">Conciliação Banco 10 (Winthor : 604)</label></div><div class="checkbox"><label><input type="checkbox" name="checkbox021" value="Conciliação Banco 997 (Winthor : 604)">Conciliação Banco 997 (Winthor : 604)</label></div><div class="checkbox"><label><input type="checkbox" name="checkbox022" value="Conciliação Banco 999 (Winthor : 604)">Conciliação Banco 999 (Winthor : 604)</label></div><div class="checkbox"><label><input type="checkbox" name="checkbox023" value="Preencher saldos dia anterior drive">Preencher saldos dia anterior drive</label></div></div></div></div></div></form>
		

			<script type="text/javascript">
				var keyDown = false, ctrl = 17, vKey = 86, Vkey = 118; 
				  
				$(document).keydown(function (e) {
					if (e.keyCode == ctrl) keyDown = true;
				}).keyup(function (e) {
					if (e.keyCode == ctrl) keyDown = false;
				});
				
				$('[data-only-numbers]').on('keypress', function (e) {
				    if (!e) {
					    var e = window.event;
					}
					
				    if (e.keyCode > 0 && e.which == 0) {
				    	 return true;
					}
					
				    if (e.keyCode) {
				        code = e.keyCode;
					} else if (e.which) {
				    	code = e.which;
					}

					if(code == 46) {
						return true;
					}
					
				    var character = String.fromCharCode(code);
				    if (character == '\b' || character == ' ' || character == '\t') {
				    	 return true;
					}
				    if (keyDown && (code == vKey || code == Vkey)) {
				    	return (character);
					} else  {
						return (/[0-9]$/.test(character));
					}
				}).on('focusout', function (e) {
				    var $this = $(this);
					if($this.val() == "") {
						return true;
					}
				    $this.val($this.val().replace(/[^0-9\.]/g, ''));
				}).on('paste', function (e) {
				    var $this = $(this);
				    setTimeout(function () {
				        $this.val($this.val().replace(/[^0-9\.]/g, ''));
				    }, 5);
				 });				

				

				$('.create-form-components').on('keyup', 'input[required="required"][type="text"], input[required="required"][type="number"], input[required="required"][type="date"], textarea[required="required"]', function(){
					validationFieldsForm($(this), $(this).parents('.form-field').data('type'));
				});

				$('.create-form-components').on('change', 'input[required="required"][type="checkbox"], input[required="required"][type="radio"], select[required="required"]', function(){
					validationFieldsForm($(this), $(this).parents('.form-field').data('type'));
				});

				function validationFieldsForm(field, type){
					if(type === "checkbox" || type === "radio"){
						if(!field.is(':checked')){
							field.parents('.form-field').addClass('required');
						}else{
							field.parents('.form-field').removeClass('required');
						}
					}else{
						if(!field.val().trim()){
							field.parents('.form-field').addClass('required');
						}else{
							field.parents('.form-field').removeClass('required');
						}
					}
				}

				var $zoomPreview = $(".zoom-preview");
				if ($zoomPreview.length) {
                    $zoomPreview.parent().removeClass("input-group");
                    $zoomPreview.remove();
                }

				var ratings = $(".rating");
				if (ratings.length > 0) ratingStars(ratings);
				function ratingStars(stars) {
					$.each(stars, function(i, obj) {
                        var field = $(this).closest(".form-group").find(".rating-value");
						var tgt = $(obj);
						tgt.html("");
						var rating = FLUIGC.stars(tgt, { value: field.val() });
                        rating.on("click", function(o) {
                            field.val($(this).index() + 1);
                        });
					});
				}

				$.each($("[data-date]"), function(i, o) {
                    var id = $(o).attr("id");
					FLUIGC.calendar("#" + id);
				});

				$(document).ready(function() {
					$.each($("[data-date]"), function(i, o) {
	                    var id = $(o).attr("id");
	                    if($("#" + id).attr("readonly")) {
	                    	$("#" + id).data('DateTimePicker').disable();
	                    }
					});
				});
			</script>
