      <div class="panel-body"> <!--panel body geral do arquivo - fecha no extremo e contém todas as seções-->

            <div class="panel-body">

              <div class="form-input" hidden>

                    <div class="input-group-addon zoom-preview">

                    </div>
                    <input type="hidden" name="hidden_Solicitante" id="hidden_Solicitante" />

                </div>
              </div>

              <div class="row">

                <div class="form-group col-md-3">

                  <div class="input-group">
                    <input type="text" name="solicitante" id="solicitante" class="form-control" readonly>

                  </div>
                </div>

                <div class="form-group col-md-3">
                  <label>Supervisor</label>
                  <div class="input-group">
                    <input type="text" name="supervisorSolicitante" id="supervisorSolicitante" class="form-control"

                </div>

                <div class="form-group col-md-3">

        </div> <!--fecha panel-primary-->

        <div class="panel panel-primary"> <!--declaração da primeira seção-->

        <div class="panel panel-primary"> <!--declaração da primeira seção-->

                    <div class="form-group col-md-4">
                      <label>Observação DP</label><input type="text" class="form-control" name="obs_dp" value=""
                        placeholder="" data-size="big" />
                    </div>
                  </div>
                </div>


              </div> <!--fecha row-->
            </div> <!--fecha panel body-->
          </div> <!--fecha panel primary-->

  </form>

  <script type="text/javascript">
    var keyDown = false,
      ctrl = 17,
      vKey = 86,
      Vkey = 118;

    $(document)
      .keydown(function (e) {
        if (e.keyCode == ctrl) keyDown = true;
      })
      .keyup(function (e) {
        if (e.keyCode == ctrl) keyDown = false;
      });

    $("[data-only-numbers]")
      .on("keypress", function (e) {
        if (!e) {
          var e = window.event;
        }

        if (e.keyCode > 0 && e.which == 0) {
          return true;
        }

        if (e.keyCode) {
          code = e.keyCode;
        } else if (e.which) {
          code = e.which;
        }

        if (code == 46) {
          return true;
        }

        var character = String.fromCharCode(code);
        if (character == "\b" || character == " " || character == "\t") {
          return true;
        }
        if (keyDown && (code == vKey || code == Vkey)) {
          return character;
        } else {
          return /[0-9]$/.test(character);
        }
      })
      .on("focusout", function (e) {
        var $this = $(this);
        if ($this.val() == "") {
          return true;
        }
        $this.val($this.val().replace(/[^0-9\.]/g, ""));
      })
      .on("paste", function (e) {
        var $this = $(this);
        setTimeout(function () {
          $this.val($this.val().replace(/[^0-9\.]/g, ""));
        }, 5);
      });

    $(".create-form-components").on(
      "keyup",
      'input[required="required"][type="text"], input[required="required"][type="number"], input[required="required"][type="date"], textarea[required="required"]',
      function () {
        validationFieldsForm(
          $(this),
          $(this).parents(".form-field").data("type")
        );
      }
    );

    $(".create-form-components").on(
      "change",
      'input[required="required"][type="checkbox"], input[required="required"][type="radio"], select[required="required"]',
      function () {
        validationFieldsForm(
          $(this),
          $(this).parents(".form-field").data("type")
        );
      }
    );

    function validationFieldsForm(field, type) {
      if (type === "checkbox" || type === "radio") {
        if (!field.is(":checked")) {
          field.parents(".form-field").addClass("required");
        } else {
          field.parents(".form-field").removeClass("required");
        }
      } else {
        if (!field.val().trim()) {
          field.parents(".form-field").addClass("required");
        } else {
          field.parents(".form-field").removeClass("required");
        }
      }
    }

    var $zoomPreview = $(".zoom-preview");
    if ($zoomPreview.length) {
      $zoomPreview.parent().removeClass("input-group");
      $zoomPreview.remove();
    }

    var ratings = $(".rating");
    if (ratings.length > 0) ratingStars(ratings);
    function ratingStars(stars) {
      $.each(stars, function (i, obj) {
        var field = $(this).closest(".form-group").find(".rating-value");
        var tgt = $(obj);
        tgt.html("");
        var rating = FLUIGC.stars(tgt, { value: field.val() });
        rating.on("click", function (o) {
          field.val($(this).index() + 1);
        });
      });
    }

    $.each($("[data-date]"), function (i, o) {
      var id = $(o).attr("id");
      FLUIGC.calendar("#" + id);
    });

    $(document).ready(function () {
      $.each($("[data-date]"), function (i, o) {
        var id = $(o).attr("id");
        if ($("#" + id).attr("readonly")) {
          $("#" + id)
            .data("DateTimePicker")
            .disable();
        }
      });
    });
  </script>
