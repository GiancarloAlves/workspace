<html>

<head>
	<link type="text/css" rel="stylesheet" href="/style-guide/css/fluig-style-guide.min.css" />
	<script type="text/javascript" src="/portal/resources/js/jquery/jquery.js"></script>
	<script type="text/javascript" src="/portal/resources/js/jquery/jquery-ui.min.js"></script>
	<script type="text/javascript" src="/portal/resources/js/mustache/mustache-min.js"></script>
	<script type="text/javascript" src="/style-guide/js/fluig-style-guide.min.js" charset="utf-8"></script>

	<!-- Dataset -->
	<script type="text/javascript" src="/webdesk/vcXMLRPC.js"></script>

	<!-- sweetalert2 -->
	<script src="//cdn.jsdelivr.net/npm/sweetalert2@11"></script>

	<!-- FontAwesome -->
	<link type="text/css" rel="stylesheet"
		href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

	<!-- JQuery Mask Plugin -->
	<script src="https://igorescobar.github.io/jQuery-Mask-Plugin/js/jquery.mask.min.js"></script>

	<!-- Custom -->
	<link type="text/css" rel="stylesheet" href="./style_log.css">
	<script type="text/javascript" src="./app.js"></script>


<body class="fluig-style-guide process-style" id="devkit-style">
	<form name="form" role="form" id="form-processo">

		<div class="panel panel-primary panel-border">
			<!--Painel geral do formulário - fecha no extremo do arquivo e contém todas as seções-->

			<div class="panel-heading panel-bg panel-border"> <!--início da declaração do cabeçalho principal (azul)-->
				<div class="container-fluid">
					<section id="logo">
						<img src="./images/logoCigame.png" alt="NOME-CLIENTE" width="130" style="padding: 10px;">
						<h3 class="panel-title">PEDIDO DE ENTREGA DE URGÊNCIA</h3>
					</section>
				</div>
			</div> <!--fim da declaração do cabeçalho principal (azul)-->

			<div class="panel-body"> <!--panel body geral do arquivo - fecha no extremo e contém todas as seções-->

				<div class="panel panel-primary"> <!--declaração da primeira seção-->
					<div class="panel-heading"> <!--início do cabeçalho da seção-->
						<h3 class="panel-title subpanel_title">
							<span id="led_abertura" class="led"></span>
							<a class="collapse-icon up" data-toggle="collapse" data-parent="#accordion"
								href="#abertura"><i class="far fa-clipboard"></i> DADOS DO PEDIDO</a>
						</h3>
					</div> <!--fim da declaração do cabeçalho da seção-->

					<div id="abertura" class="panel-collapse collapse in">
						<div class="panel-body">

							<div class="row">

								<div class="form-group col-md-3">
									<label>Solicitante</label>
									<div class="input-group">
										<input type="text" name="solicitante" id="solicitante" class="form-control"
											readonly>
										<span class="input-group-addon"><i class="fas fa-user"></i></span>
									</div>
								</div>

								<div class="form-group col-md-3">
									<label>Supervisor</label>
									<div class="input-group">
										<input type="text" name="supervisorSolicitante" id="supervisorSolicitante"
											class="form-control" readonly>
										<span class="input-group-addon"><i class="fas fa-user-shield"></i></span>
									</div>
								</div>

								<div class="form-group col-md-2">
									<label>Tipo solicitante</label>
									<div class="input-group">
										<input type="text" name="tipoSolicitante" id="tipoSolicitante"
											class="form-control" readonly>
										<span class="input-group-addon"><i class="fas fa-graduation-cap"></i></span>
									</div>
								</div>

								<div class="form-group col-md-2">
									<label>Mat. solicitante</label>
									<div class="input-group">
										<input type="text" name="matSolicitante" id="matSolicitante"
											class="form-control" readonly>
										<!-- <span class="input-group-addon"><i class="fas fa-graduation-cap"></i></span> -->
									</div>
								</div>

								<div class="form-group col-md-2">
									<label>Mat. supervisor</label>
									<div class="input-group">
										<input type="text" name="matSupervisor" id="matSupervisor" class="form-control"
											readonly>
										<!-- <span class="input-group-addon"><i class="fas fa-graduation-cap"></i></span> -->
									</div>
								</div>

							</div>

							<div class="row">

								<div class="form-group col-md-3">
									<label class="required">Número do pedido</label>
									<input type="zoom" name="numped" id="numped" class="form-control" data-zoom="
											{
												'displayKey':'A01_PEDIDO',
												'datasetId':'ds_cancelamento_pedido_form_winthor',
												'maximumSelectionLength':'1',
												'placeholder':'Buscar...',
												'fields':[
													{'field':'A01_PEDIDO','label':'Num. pedido','standard':'true'}
												]
											}">
								</div>


								<div class="form-group col-md-3">
									<label class="required">Cod.cliente</label>
									<input type="zoom" name="codcli" id="codcli" class="form-control" data-zoom="
											{
												'displayKey':'A02_COD_CLI',
												'datasetId':'ds_cancelamento_pedido_form_winthor',
												'maximumSelectionLength':'1',
												'placeholder':'Buscar...',
												'fields':[
													{'field':'A02_COD_CLI','label':'Codcli','standard':'true'}
												]
											}">
								</div>

								<div class="form-group col-md-6">
									<label class="required">Cliente</label>
									<input type="zoom" name="cliente" id="cliente" class="form-control" data-zoom="
											{
												'displayKey':'A03_CLIENTE',
												'datasetId':'ds_cancelamento_pedido_form_winthor',
												'maximumSelectionLength':'1',
												'placeholder':'Buscar...',
												'fields':[
													{'field':'A03_CLIENTE','label':'Cliente','standard':'true'}
												]
											}">
								</div>
							</div>


							<div class="row">

								<div class="form-group col-md-3">
									<label>Data pedido</label>
									<div class="input-group">
										<input type="text" name="dataped" id="dataped" class="form-control" readonly>
										<span class="input-group-addon">
											<i class="fas fa-calendar"></i>
										</span>
									</div>
								</div>

								<div class="form-group col-md-3">
									<label>Dt. integr. WMS</label>
									<div class="input-group">
										<input type="text" name="dtwms" id="dtwms" class="form-control" readonly>
										<span class="input-group-addon">
											<i class="fas fa-money-bill"></i>
										</span>
									</div>
								</div>

								<div class="form-group col-md-4">
									<label>Validação</label>
									<div class="input-group">
										<input type="text" name="validacao" id="validacao" class="form-control"
											readonly>
										<span class="input-group-addon">
											<i class="fas fa-exclamation"></i>
										</span>
									</div>
								</div>

								<div class="form-group col-md-2">
									<label>Qt.item esp</label>
									<div class="input-group">
										<input type="text" name="qtditensesp" id="qtditensesp" class="form-control"
											readonly>
										<span class="input-group-addon">
											<i class="fas fa-money-bill"></i>
										</span>
									</div>
								</div>

							</div>

							<div class="row">

								<div class="form-group col-md-3">
									<label>Status pedido</label>
									<div class="input-group">
										<input type="text" name="status" id="status" class="form-control" readonly
											onchange="validaStatus()">
										<span class="input-group-addon">
											<i class="fas fa-exclamation"></i>
										</span>
									</div>
								</div>

								<div class="form-group col-md-3">
									<label>Status WMS</label>
									<div class="input-group">
										<input type="text" name="statuswms" id="statuswms" class="form-control"
											readonly>
										<span class="input-group-addon">
											<i class="fas fa-exclamation"></i>
										</span>
									</div>
								</div>

								<div class="form-group col-md-3">
									<label class="required">Tipo de transporte</label>
									<div class="input-group">
										<select class="form-control" name="acertoCredito" id="acertoCredito">
											<option value="">Selecione</option>
											<option>Moto</option>
											<option>Caminhão</option>
											<option>Transportadora</option>
										</select>
										<span class="input-group-addon"><i class="fas fa-truck"></i></span>
									</div>
								</div>

								<div class="form-group col-md-3">
									<label class="required">Contato do cliente</label>
									<div class="input-group">
										<input type="text" name="fone" id="fone" mask="(00) 00000-0000"
											placeholder="(00) 00000-0000" class="form-control">
										<span class="input-group-addon">
											<i class="fas fa-phone"></i>
										</span>
									</div>
								</div>

							</div>

							<div class="row">

								<div class="form-group col-md-2">
									<label class="required">Frete cobrado na nota?</label>
									<div class="input-group">
										<select type="text" name="freteCobrado" id="freteCobrado" class="form-control">
											<option value="">Selecione</option>
											<option value="sim">Sim</option>
											<option value="nao">Não</option>
										</select>
										<span class="input-group-addon">
											<i class="fas fa-money-bill"></i>
										</span>
									</div>
								</div>

								<div class="form-input col-md-4">
									<div class="form-group">
										<label class="required">Data/hora que o cliente quer receber a
											mercadoria</label><input type="text" class="form-control" name="dataHrReceb"
											id="dataHrReceb" value="" placeholder="dd/mm/aaaa hh:mm" data-size="big"
											mask="00/00/0000 00:00" maxlength="19" data-only-numbers="true" />
									</div>
								</div>

								<div class="form-input col-md-3">
									<div class="form-group">
										<label class="required">Data/hora limite para entrega</label><input type="text"
											class="form-control" name="dataHrlimite" id="dataHrlimite" value=""
											placeholder="dd/mm/aaaa hh:mm" data-size="big" mask="00/00/0000 00:00"
											maxlength="19" data-only-numbers="true" />
									</div>
								</div>

								<div class="form-group col-md-3">
									<label class="required">Local da entrega</label>
									<div class="input-group">
										<input type="text" name="localEntrega" id="localEntrega" class="form-control">
										<span class="input-group-addon">
											<i class="fas fa-map"></i>
										</span>
									</div>
								</div>

							</div>

							<div class="row">

								<div class="form-input col-md-12">
									<label>Observação vendedor</label>
									<div class="input-group">
										<textarea class="form-control" rows="2" name="obs" id="obs"></textarea>
										<span class="input-group-addon"><i class="fas fa-pen"></i></span>
									</div>
								</div>

							</div>

							<div class="row">

								<div class="spacer"></div>

							</div>

							<div class="row">

								<div class="form-field" data-type="tabledetail" data-show-properties=""
									data-field-name="pedido">
									<table id="pedido" class="table pai-filho table-striped" tablename="pedido"
										noaddbutton="true" nodeletebutton="true">

										<thead>

											<tr>
												<th width="10%">
													Cód.produto&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
												</th>
												<th width="30%">Descrição
													produto&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
												</th>
												<th width="10%">
													Qtd&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
												</th>
												<th width="10%">
													Tipo&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
												</th>

											</tr>
										</thead>
										<tbody>
											<tr>
												<td><input type="text" name="codprod" id="codprod" class="form-control"
														readonly></td>
												<td><input type="text" name="descprod" id="descprod"
														class="form-control" readonly></td>
												<td><input type="text" name="qtd" id="qtd" class="form-control"
														readonly></td>
												<td><input type="text" name="tipo" id="tipo" class="form-control"
														readonly></td>
												<td class="remove" hidden>
													<span class="fs-display-block fs-sm-space">
														<i class="flaticon flaticon-close icon-md remove-button"
															onclick="fnWdkRemoveChild(this)"></i>
													</span>
												</td>
											</tr>
										</tbody>
									</table>

									<div class="form-group" id="additem" hidden>
										<div class="row">
											<div class="col-xs-6">
												<button class="btn btn-primary btn-custom btn-custom-primary js-add">
													<i class="fas fa-plus-circle"></i> ADICIONAR ITEM
												</button>
											</div>
										</div>
									</div>

								</div>

							</div>

						</div> <!-- finaliza body-->
					</div> <!--finaliza colapsável-->
				</div> <!--fecha o painel primary-->

				<div class="panel panel-primary"> <!--declaração seção-->
					<div class="panel-heading"> <!--início do cabeçalho da seção-->
						<h3 class="panel-title subpanel_title">
							<span id="led_tratativa" class="led"></span>
							<a class="collapse-icon up" data-toggle="collapse" data-parent="#accordion"
								href="#tratativa"><i class="far fa-clipboard"></i> TRATATIVA DA LOGÍSTICA </a>
						</h3>
					</div> <!--fim da declaração do cabeçalho da seção-->

					<div id="tratativa" class="panel-collapse collapse in">
						<div class="panel-body">

							<div class="row">

								<div class="form-group col-md-3">
									<label class="required">Aprovar solicitação?</label>
									<div class="input-group">
										<select type="text" name="aprovLog" id="aprovLog" class="form-control">
											<option value="">Selecione uma opção</option>
											<option value="Sim">Sim</option>
											<option value="Não">Não</option>
										</select>
									</div> 
								</div>
							</div>

							<div class="row">
								<div class="form-input col-md-12">
									<label>Observação logística</label>
									<div class="input-group">
										<textarea class="form-control" rows="2" name="obsOcorrencias"
											id="obsOcorrencias"></textarea>
										<span class="input-group-addon"><i class="fas fa-pen"></i></span>
									</div>
								</div>
							</div>


						</div> <!-- finaliza body-->
					</div> <!--finaliza colapsável-->
				</div> <!--fecha o painel primary-->

				<div class="panel panel-primary"> <!--declaração seção-->
					<div class="panel-heading"> <!--início do cabeçalho da seção-->
						<h3 class="panel-title subpanel_title">
							<span id="led_fim" class="led"></span>
							<a class="collapse-icon up" data-toggle="collapse" data-parent="#accordion" href="#fim"><i
									class="far fa-clipboard"></i> ACOMPANHAMENTO DO VENDEDOR</a>
						</h3>
					</div> <!--fim da declaração do cabeçalho da seção-->

					<div id="fim" class="panel-collapse collapse in">
						<div class="panel-body">

							<div class="row">

								<div class="form-group col-md-2">
									<label>Demanda atendida?</label>
									<div class="radio-options">
										<div class="radio"><label><input type="radio" name="expectativa" value="Sim"
													checked />Sim</label></div>
										<div class="radio"><label><input type="radio" name="expectativa"
													value="Não" />Não</label></div>
									</div>
								</div>

								<div class="form-input col-md-6" id="obsdev">
									<label>Observação vendedor</label>
									<div class="input-group">
										<textarea class="form-control" rows="2" name="obsVendedor"
											id="obsVendedor"></textarea>
										<span class="input-group-addon"><i class="fas fa-pen"></i></span>
									</div>
								</div>

							</div>

						</div> <!-- finaliza body-->
					</div> <!--finaliza colapsável-->
				</div> <!--fecha o painel primary-->

			</div> <!--fim do formulário-->
		</div> <!--fim do formulário-->

	</form>
</body>

</html>
